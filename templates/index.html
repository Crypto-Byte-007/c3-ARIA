<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARIA | NullGrids Internal Assistant</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a12;
            --bg-accent: #11111f;
            --primary: #7f7fff;
            --primary-glow: rgba(127, 127, 255, 0.3);
            --user-bubble: #1e1e30;
            --aria-bubble: #16162a;
            --text-main: #d1d1e0;
            --text-dim: #70708f;
            --border: #24243e;
            --transition: all 0.3s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Space Grotesk', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Animated Background */
        .bg-lines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 50% 50%, rgba(127, 127, 255, 0.05) 0%, transparent 50%),
                linear-gradient(rgba(127, 127, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(127, 127, 255, 0.02) 1px, transparent 1px);
            background-size: 100% 100%, 40px 40px, 40px 40px;
            z-index: -1;
        }

        /* Header */
        header {
            padding: 20px 40px;
            background: rgba(10, 10, 18, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: var(--primary);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 15px var(--primary-glow);
        }

        .logo-text {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 2px;
            color: var(--primary);
        }

        .status-tag {
            background: rgba(127, 127, 255, 0.1);
            border: 1px solid var(--primary);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--primary);
        }

        /* Chat Container */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
            padding: 20px;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--border) transparent;
        }

        #chat-history {
            display: flex;
            flex-direction: column;
            gap: 24px;
            padding-bottom: 40px;
        }

        .message {
            max-width: 80%;
            padding: 16px 20px;
            border-radius: 20px;
            line-height: 1.6;
            position: relative;
            animation: slideUp 0.4s ease-out;
        }

        .user-message {
            align-self: flex-end;
            background: var(--user-bubble);
            border: 1px solid var(--border);
            border-bottom-right-radius: 4px;
        }

        .aria-message {
            align-self: flex-start;
            background: var(--aria-bubble);
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .message-label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-dim);
            margin-bottom: 4px;
        }

        .message-content {
            font-size: 15px;
        }

        .aria-message .message-content {
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
        }

        /* Input Area */
        footer {
            padding: 30px 40px;
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
        }

        .input-wrapper {
            background: var(--bg-accent);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 8px;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: var(--transition);
        }

        .input-wrapper:focus-within {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px var(--primary-glow);
        }

        #user-input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-main);
            padding: 12px;
            font-family: inherit;
            font-size: 16px;
            outline: none;
        }

        .send-btn {
            background: var(--primary);
            color: var(--bg);
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
        }

        .send-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px var(--primary-glow);
        }

        /* Typing Indicator */
        .typing {
            display: flex;
            gap: 4px;
            padding: 4px 8px;
        }

        .dot {
            width: 6px;
            height: 6px;
            background: var(--primary);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out;
        }

        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Info Panel */
        .info-panel {
            position: fixed;
            left: 20px;
            bottom: 20px;
            font-size: 10px;
            color: var(--text-dim);
            font-family: 'JetBrains Mono', monospace;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="bg-lines"></div>

    <header>
        <div class="logo">
            <div class="logo-icon">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#0a0a12" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
            </div>
            <span class="logo-text">ARIA</span>
        </div>
        <div class="status-tag">Internal Use Only</div>
    </header>

    <main id="main-scroll">
        <div id="chat-history">
            <div class="message aria-message">
                <div class="message-label">System</div>
                <div class="message-content">
                    Initialize ARIA v2.1.0... <br>
                    Welcome, Employee. I am the NullGrids Internal Assistant. How can I assist you with infrastructure or platform queries today?
                </div>
            </div>
        </div>
    </main>

    <footer>
        <div class="input-wrapper">
            <input type="text" id="user-input" placeholder="Enter your query..." autocomplete="off">
            <button id="send-btn" class="send-btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
            </button>
        </div>
    </footer>

    <div class="info-panel">
        ID: NG-SRV-7712<br>
        SEC_LVL: 4<br>
        PROTO: TLS_1.3
    </div>

    <script>
        const chatHistory = document.getElementById('chat-history');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const mainScroll = document.getElementById('main-scroll');

        function appendMessage(role, content) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${role}-message`;
            
            const label = document.createElement('div');
            label.className = 'message-label';
            label.textContent = role === 'user' ? 'Employee' : 'ARIA';
            
            const text = document.createElement('div');
            text.className = 'message-content';
            text.innerHTML = content.replace(/\n/g, '<br>');
            
            msgDiv.appendChild(label);
            msgDiv.appendChild(text);
            chatHistory.appendChild(msgDiv);
            
            mainScroll.scrollTo({ top: mainScroll.scrollHeight, behavior: 'smooth' });
        }

        function showTyping() {
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message aria-message typing-indicator';
            typingDiv.innerHTML = `
                <div class="message-label">ARIA</div>
                <div class="typing">
                    <div class="dot"></div>
                    <div class="dot"></div>
                    <div class="dot"></div>
                </div>
            `;
            chatHistory.appendChild(typingDiv);
            mainScroll.scrollTo({ top: mainScroll.scrollHeight, behavior: 'smooth' });
            return typingDiv;
        }

        async function sendMessage() {
            const message = userInput.value.trim();
            if (!message) return;

            userInput.value = '';
            appendMessage('user', message);

            const typing = showTyping();

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: message })
                });

                const data = await response.json();
                typing.remove();

                if (data.aria) {
                    appendMessage('aria', data.aria);
                } else {
                    appendMessage('aria', 'ERROR: Connection to neural core failed.');
                }
            } catch (err) {
                typing.remove();
                appendMessage('aria', 'ERROR: Transmission error.');
            }
        }

        sendBtn.addEventListener('click', sendMessage);
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
